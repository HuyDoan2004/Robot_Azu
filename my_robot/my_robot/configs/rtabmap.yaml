rgbd_odometry:
  ros__parameters:
    # Odom từ RGB-D + IMU của D435i
    frame_id: "base_link"        # dùng camera làm gốc
    odom_frame_id: "odom"
    publish_tf: true

    Reg/Force3DoF: "false"         # 6DoF, cho phép xoay/ngước camera
    subscribe_imu: true

    Vis/FeatureType: "6"           # ORB
    Vis/MaxFeatures: "1500"
    Vis/MinInliers: "8"
    FAST/Threshold: "5"
    GFTT/QualityLevel: "0.001"
    Odom/MinInliers: "8"
    Odom/ResetCountdown: "1"

    # Đồng bộ RGB + Depth (+ IMU)
    approx_sync: true
    approx_sync_max_interval: 0.15   # nới rộng cửa sổ cho 15 FPS
    topic_queue_size: 30
    sync_queue_size: 100
    wait_for_transform: 0.5

rtabmap:
  ros__parameters:
    # Khung TF
    frame_id: "base_link"
    odom_frame_id: "odom"
    map_frame_id: "map"

    subscribe_depth: true
    subscribe_scan: true        

    # Map 2D/3D
    Grid/FromDepth: "false"          # tạo map 2D từ depth
    Grid/CellSize: "0.05"
    Grid/RangeMax: "6.0"
    Grid/MaxObstacleHeight: "2.0"

    # Cloud 3D (dùng cho MapCloud/PointCloud)
    Cloud/OutputVoxelized: "true"
    Cloud/OutputVoxelSize: "0.03"
    Cloud/MinDepth: "0.25"
    Cloud/MaxDepth: "5.0"

    # Đồng bộ RGB-D cho SLAM
    approx_sync: true
    approx_sync_max_interval: 0.15
    topic_queue_size: 30
    sync_queue_size: 100
    wait_for_transform: 0.5

    # DB tạm
    database_path: "/tmp/rtabmap_tmp.db"
    database_in_memory: true
    delete_db_on_start: true
    save_db_on_shutdown: false
